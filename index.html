<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- property - свойство -->
    <meta property="og:title" content="MaxProff" />
    <meta
      property="og:description"
      content="Самые дешевые квартиры в Москве"
    />
    <meta
      name="description"
      content="Услуги строительной компании в г.Москва"
    />
    <title>MaxProff</title>
    <link
      rel="icon"
      href="#"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./assets/styles/index.css">
</head>
<body>
    <section class="promo" id="promo">
      <div class="container">
        <h2 class="title">Акции</h2>
        <div class="promo__cards">
          <div class="promo__card1">
            <div class="promo__card_content">
              <h3 class="card__content__title">Новоселам</h3>
              <p class="card__content_desc">
                Специальная скидка для тех кто переехал не более года назад
              </p>
            </div>
            <button class="promo__card_btn">Получить скидку</button>
          </div>
          <div class="promo__card2">
            <div class="promo__card_content">
              <h3 class="card__content__title">Молодоженам</h3>
              <p class="card__content_desc">
                Спец.скидка если с момента регистрации прошло не более года
              </p>
            </div>
            <button class="promo__card_btn">Получить скидку</button>
          </div>
          <div class="promo__card3">
            <div class="promo__card_content">
              <h3 class="card__content__title">Пенсионерам</h3>
              <p class="card__content_desc">
                Специальная скидка для наших дорогих
              </p>
            </div>
            <button class="promo__card_btn">Получить скидку</button>
          </div>
        </div>
        <button class="allpromo">Все акции</button>
      </div>
    </section>
</body>
</html>
